<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="format-detection" content="telephone=no">
    <meta name="description" content="Interactive web tool for comparing different cartographic projections using WebGPU. Visualize how map projections transform the sphere with real-time rendering.">
    <meta name="keywords" content="cartography, map projections, WebGPU, geography, Mercator, orthographic, perspective, tissot, graticule">
    <meta name="color-scheme" content="light dark">
    <meta property="og:title" content="Flatsphere: Interactive Reprojections of the Sphere">
    <meta property="og:description" content="Interactive web tool for comparing different cartographic projections">
    <meta property="og:type" content="website">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' https://cdn.jsdelivr.net; script-src 'self' https://cdn.jsdelivr.net; img-src 'self' data: blob: https:; connect-src 'self' https://api.allorigins.win; worker-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self';">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.orange.min.css">
    <link rel="stylesheet" href="styles/main.css">
    <link rel="icon" type="image/svg+xml" sizes="any" href="./flatsphere-logo-static.svg">

    <title>Flatsphere: Interactive Reprojections of the Sphere</title>
</head>
<body>
    <main class="app-container">
        <canvas id="projectionCanvas" aria-label="Interactive map projection visualization" role="img"></canvas>
        
        <aside id="sidebar" data-theme="dark">
            <header>
                <h2 class="sidebar-title">Flatsphere</h2>
                <div class="sidebar-header-buttons">
                    <button id="sidebarSideToggle" type="button" class="sidebar-side-toggle" aria-label="Move sidebar to other side">
                        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
                            <rect x="1" y="1" width="14" height="14" rx="2" stroke="currentColor" stroke-width="1.5" fill="none"/>
                            <rect class="sidebar-side-indicator" x="1" y="1" width="5" height="14" rx="2" fill="currentColor"/>
                        </svg>
                    </button>
                    <button id="sidebarToggle" type="button" class="sidebar-toggle" aria-label="Toggle sidebar">
                        <span class="sidebar-toggle-icon" aria-hidden="true"></span>
                    </button>
                </div>
            </header>
            <nav class="sidebar-content">
                <details>
                    <summary>Projections</summary>
                    <label for="destinationProjection">
                        Shown Projection
                        <select id="destinationProjection"></select>
                    </label>
                    <label for="sourceProjection">
                        Source Projection
                        <select id="sourceProjection"></select>
                    </label>
                </details>

                <details>
                    <summary>Custom Image</summary>
                    <fieldset role="group">
                        <input type="text" id="imageUrl" aria-label="Custom Image URL" aria-describedby="image-url-help" placeholder="Enter image URL"/>
                        <input type="button" id="loadImageButton" value="Load"/>
                    </fieldset>
                    <small id="image-url-help">Use an image from somewhere else on the internet</small>

                    <input type="file" id="fileInput" accept="image/*"/>
                    <small id="file-input-help">Or select an image file saved on your device</small>
                </details>

                <details>
                    <summary>Display Options</summary>
                    <label>
                        <input type="checkbox" role="switch" id="fullscreenToggle">
                        Fullscreen
                    </label>
                    <label>
                        <input type="checkbox" role="switch" id="tissotToggle">
                        Show Tissot's Indicatrices
                    </label>
                    <label>
                        <input type="checkbox" role="switch" id="graticuleToggle">
                        Show Graticule
                    </label>
                    <label for="aspectRatioSlider">
                        Aspect Ratio: <span id="aspectRatioValue">1.0x</span>
                        <input type="range" id="aspectRatioSlider" min="0.01" max="2.0" step="0.01" value="1.0">
                    </label>
                    <label for="zoomSlider">
                        Zoom: <span id="zoomValue">1.0x</span>
                        <input type="range" id="zoomSlider" min="-2" max="1" step="0.01" value="0">
                    </label>
                </details>
            </nav>
        </aside>
        
        <div class="loading-backdrop" id="loadingBackdrop" role="alert" aria-live="polite" aria-busy="true">
            <div class="loading-content">
                <img src="flatsphere-logo-animated.svg" alt="Loading..." class="loading-logo" />
                <div class="loading-text">Loading...</div>
            </div>
        </div>
        
        <div id="notificationDiv" class="notification" aria-live="polite" aria-atomic="true" role="status"></div>

        <noscript>
            <p>This application requires JavaScript and WebGPU support to function.</p>
        </noscript>
    </main>

    <script type="module" src="scripts/main.js"></script>
</body>
</html>
