<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="format-detection" content="telephone=no">
    <title>WebGPU Sphere Reprojection Tool</title>
    <script type="importmap">
        {
          "imports": {
            "wesl": "https://cdn.jsdelivr.net/npm/wesl/+esm"
          }
        }
    </script>
    <style>
        /* Reset and prevent bounce scrolling on iOS */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html, body {
            position: fixed;
            overflow: hidden;
            -webkit-overflow-scrolling: touch;
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: Arial, sans-serif;
            background-color: #1e1e1e;
            color: #fff;
        }
        
        .app-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
        }
        
        #projectionCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: #000;
            touch-action: none; /* Prevent default touch behaviors */
            display: block;
        }
        
        .controls-overlay {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            z-index: 100;
            background: rgba(45, 45, 45, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            padding: 15px;
            max-width: 350px;
            transition: opacity 0.3s ease;
        }
        
        .controls-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        
        .app-title {
            font-size: 1.1em;
            font-weight: bold;
            margin: 0;
        }
        
        .header-buttons {
            display: flex;
            gap: 8px;
        }
        
        .control-button {
            background: rgba(64, 64, 64, 0.8);
            border: 1px solid #555;
            border-radius: 6px;
            color: #fff;
            padding: 6px 10px;
            font-size: 0.9em;
            cursor: pointer;
            transition: background 0.2s ease;
        }
        
        .control-button:hover {
            background: rgba(80, 80, 80, 0.8);
        }
        
        .control-button.active {
            background: rgba(100, 150, 255, 0.8);
        }
        
        .controls-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        
        .control-group {
            margin: 0;
        }
        
        .control-group.full-width {
            grid-column: 1 / -1;
        }
        
        label {
            display: block;
            margin-bottom: 6px;
            font-weight: bold;
            font-size: 0.9em;
        }
        
        select, input[type="range"] {
            width: 100%;
            padding: 8px;
            background-color: rgba(64, 64, 64, 0.8);
            border: 1px solid #555;
            border-radius: 6px;
            color: #fff;
            font-size: 0.9em;
        }
        
        input[type="checkbox"] {
            width: 18px;
            height: 18px;
            margin: 0;
            accent-color: #64a6ff;
        }
        
        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .range-display {
            display: flex;
            justify-content: space-between;
            margin-top: 4px;
            font-size: 0.8em;
            color: #ccc;
        }
        
        .error {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 200;
            color: #ff6b6b;
            padding: 15px 20px;
            background-color: rgba(74, 21, 21, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 8px;
            display: none;
            max-width: 90%;
            white-space: pre-line;
            line-height: 1.4;
            font-size: 0.9em;
            text-align: center;
            border: 1px solid rgba(255, 107, 107, 0.3);
        }
        
        .controls-collapsed {
            opacity: 0.3;
        }
        
        .fullscreen-button {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 100;
            background: rgba(45, 45, 45, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid #555;
            border-radius: 50%;
            color: #fff;
            width: 50px;
            height: 50px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2em;
            transition: background 0.2s ease;
        }
        
        .fullscreen-button:hover {
            background: rgba(60, 60, 60, 0.9);
        }
        
        .zoom-indicator {
            position: absolute;
            top: 80px;
            right: 20px;
            z-index: 100;
            background: rgba(45, 45, 45, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid #555;
            border-radius: 6px;
            color: #fff;
            padding: 8px 12px;
            font-size: 0.9em;
            font-family: monospace;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        
        .zoom-indicator.visible {
            opacity: 1;
        }
        
        /* Fullscreen mode safe area adjustments */
        :fullscreen .controls-overlay,
        :-webkit-full-screen .controls-overlay {
            top: max(20px, env(safe-area-inset-top));
            left: max(20px, env(safe-area-inset-left));
            right: max(20px, env(safe-area-inset-right));
        }
        
        :fullscreen .fullscreen-button,
        :-webkit-full-screen .fullscreen-button {
            top: max(20px, env(safe-area-inset-top));
            right: max(20px, env(safe-area-inset-right));
        }
        
        :fullscreen .zoom-indicator,
        :-webkit-full-screen .zoom-indicator {
            top: max(80px, calc(env(safe-area-inset-top) + 60px));
            right: max(20px, env(safe-area-inset-right));
        }
        
        :fullscreen .error,
        :-webkit-full-screen .error {
            top: max(20px, env(safe-area-inset-top));
        }
        
        /* Mobile optimizations */
        @media (max-width: 768px) {
            .controls-overlay {
                top: 10px;
                left: 10px;
                right: 70px; /* Make room for fullscreen button */
                padding: 12px;
                max-width: none;
            }
            
            .app-title {
                font-size: 1em;
            }
            
            .controls-content {
                grid-template-columns: 1fr;
                gap: 12px;
            }
            
            .control-button {
                padding: 8px 12px;
                font-size: 0.9em;
            }
            
            select, input[type="range"] {
                padding: 10px;
                font-size: 1em;
            }
            
            input[type="checkbox"] {
                width: 20px;
                height: 20px;
            }
            
            .fullscreen-button {
                top: 10px;
                right: 10px;
                width: 56px;
                height: 56px;
                font-size: 1.3em;
            }
            
            .zoom-indicator {
                top: 70px;
                right: 15px;
                font-size: 0.8em;
                padding: 6px 8px;
            }
        }
        
        /* Landscape phone optimization */
        @media (max-width: 768px) and (orientation: landscape) {
            .controls-overlay {
                top: 8px;
                right: 60px; /* Make room for fullscreen button in landscape */
                padding: 10px;
            }
            
            .controls-content {
                grid-template-columns: 1fr 1fr;
                gap: 10px;
            }
            
            .fullscreen-button {
                top: 8px;
                right: 8px;
                width: 48px;
                height: 48px;
            }
            
            .zoom-indicator {
                top: 60px;
                right: 8px;
                font-size: 0.75em;
                padding: 5px 8px;
            }
        }
        
        /* Mobile fullscreen safe area adjustments */
        @media (max-width: 768px) {
            :fullscreen .controls-overlay,
            :-webkit-full-screen .controls-overlay {
                top: max(10px, env(safe-area-inset-top));
                left: max(10px, env(safe-area-inset-left));
                right: max(70px, calc(env(safe-area-inset-right) + 56px + 10px));
            }
            
            :fullscreen .fullscreen-button,
            :-webkit-full-screen .fullscreen-button {
                top: max(10px, env(safe-area-inset-top));
                right: max(10px, env(safe-area-inset-right));
            }
            
            :fullscreen .zoom-indicator,
            :-webkit-full-screen .zoom-indicator {
                top: max(70px, calc(env(safe-area-inset-top) + 56px + 4px));
                right: max(15px, env(safe-area-inset-right));
            }
        }
        
        /* Mobile landscape fullscreen safe area adjustments */
        @media (max-width: 768px) and (orientation: landscape) {
            :fullscreen .controls-overlay,
            :-webkit-full-screen .controls-overlay {
                top: max(8px, env(safe-area-inset-top));
                left: max(8px, env(safe-area-inset-left));
                right: max(60px, calc(env(safe-area-inset-right) + 48px + 8px));
            }
            
            :fullscreen .fullscreen-button,
            :-webkit-full-screen .fullscreen-button {
                top: max(8px, env(safe-area-inset-top));
                right: max(8px, env(safe-area-inset-right));
            }
            
            :fullscreen .zoom-indicator,
            :-webkit-full-screen .zoom-indicator {
                top: max(60px, calc(env(safe-area-inset-top) + 48px + 4px));
                right: max(8px, env(safe-area-inset-right));
            }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <canvas id="projectionCanvas"></canvas>
        
        <div class="controls-overlay" id="controlsOverlay">
            <div class="controls-header">
                <h1 class="app-title">WebGPU Sphere Reprojection</h1>
                <div class="header-buttons">
                    <button class="control-button" id="toggleControls">Hide</button>
                </div>
            </div>
            
            <div class="controls-content" id="controlsContent">
                <div class="control-group full-width">
                    <label for="projectionSelect">Projection Type:</label>
                    <select id="projectionSelect">
                        <option value="0">Stereographic</option>
                        <option value="1">Polar (Azimuthal Equidistant)</option>
                        <option value="2">Orthographic</option>
                        <option value="3">Vertical Perspective</option>
                        <option value="4">Mercator</option>
                        <option value="5">Plate Carrée (Equirectangular)</option>
                    </select>
                </div>
                
                <div class="control-group full-width">
                    <label for="imageUrl">Image URL:</label>
                    <input type="text" id="imageUrl" placeholder="Enter image URL or leave empty for default" style="background-color: rgba(64, 64, 64, 0.8); border: 1px solid #555; border-radius: 6px; color: #fff; font-size: 0.9em;">
                    <small style="color: #aaa; font-size: 0.8em; margin-top: 4px; display: block;">
                        Try: https://upload.wikimedia.org/wikipedia/commons/thumb/8/83/Equirectangular_projection_SW.jpg/512px-Equirectangular_projection_SW.jpg
                    </small>
                </div>
                
                <div class="control-group full-width">
                    <label for="sourceProjection">Source Projection:</label>
                    <select id="sourceProjection">
                        <option value="0">Equirectangular (Standard Map)</option>
                        <option value="1">Stereographic</option>
                        <option value="2">Polar (Azimuthal Equidistant)</option>
                        <option value="3">Orthographic</option>
                        <option value="4">Mercator</option>
                    </select>
                </div>
                
                <div class="control-group full-width">
                    <button class="control-button" id="loadImageButton" style="width: 100%; margin-top: 5px;">Load Image</button>
                </div>
                
                <div class="control-group full-width zoom-instructions">
                    <small style="color: #ccc; font-style: italic;">
                        💡 Use mouse wheel or pinch-to-zoom to adjust zoom level
                    </small>
                </div>
                
                <div class="control-group">
                    <label for="tissotToggle">Tissot's Indicatrices:</label>
                    <div class="checkbox-group">
                        <input type="checkbox" id="tissotToggle">
                        <span>Show</span>
                    </div>
                </div>
                
                <div class="control-group">
                    <label for="graticuleToggle">Graticule:</label>
                    <div class="checkbox-group">
                        <input type="checkbox" id="graticuleToggle">
                        <span>Show</span>
                    </div>
                </div>
            </div>
        </div>
        
        <button class="fullscreen-button" id="fullscreenButton" title="Toggle Fullscreen">⛶</button>
        
        <div class="zoom-indicator" id="zoomIndicator">2.0x</div>
        
        <div id="errorDiv" class="error"></div>
    </div>

    <script type="module" src="main.js"></script>
</body>
</html>
