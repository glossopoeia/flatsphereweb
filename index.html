<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="format-detection" content="telephone=no">
    <meta name="description" content="Interactive web tool for comparing different cartographic projections using WebGPU. Visualize how map projections transform the sphere with real-time rendering.">
    <meta name="keywords" content="cartography, map projections, WebGPU, geography, Mercator, orthographic, perspective, tissot, graticule">
    <meta name="color-scheme" content="light dark">
    <meta property="og:title" content="Flatsphere: Interactive Reprojections of the Sphere">
    <meta property="og:description" content="Interactive web tool for comparing different cartographic projections">
    <meta property="og:type" content="website">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' https://cdn.jsdelivr.net; script-src 'self' https://cdn.jsdelivr.net; img-src 'self' data: blob: https:; connect-src 'self' https://api.allorigins.win; worker-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self';">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.orange.min.css">
    <link rel="stylesheet" href="styles/main.css">
    <link rel="icon" type="image/svg+xml" sizes="any" href="./flatsphere-logo-static.svg">

    <title>Flatsphere: Interactive Reprojections of the Sphere</title>

</head>
<body>
    <noscript>
        <p>This application requires JavaScript and WebGPU support to function.</p>
    </noscript>
    <main class="app-container" x-data="app">
        <header id="app-header" data-theme="dark">
            <div class="app-header-left">
                <img src="flatsphere-logo-static.svg" alt="" aria-hidden="true" class="app-header-logo">
                <h1 class="app-header-title">Flatsphere</h1>
            </div>
            <div class="app-header-right">
                <button type="button" class="app-header-btn" aria-label="Info" x-on:click="onComingSoon">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <circle cx="12" cy="12" r="10"/>
                        <line x1="12" y1="16" x2="12" y2="12"/>
                        <line x1="12" y1="8" x2="12.01" y2="8"/>
                    </svg>
                </button>
                <button type="button" class="app-header-btn" aria-label="Help" x-on:click="onComingSoon">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <circle cx="12" cy="12" r="10"/>
                        <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/>
                        <line x1="12" y1="17" x2="12.01" y2="17"/>
                    </svg>
                </button>
                <button type="button" class="app-header-btn" aria-label="Account" x-on:click="onComingSoon">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                        <circle cx="12" cy="7" r="4"/>
                    </svg>
                </button>
            </div>
        </header>

        <canvas id="projectionCanvas" aria-label="Interactive map projection visualization" role="img"></canvas>

        <aside id="sidebar" x-ref="sidebar" data-theme="dark">
            <header>
                <h2 class="sidebar-title">Settings</h2>
                <div class="sidebar-header-buttons">
                    <button type="button" class="sidebar-side-toggle" aria-label="Move sidebar to other side" x-on:click="onSidebarSideToggle">
                        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
                            <rect x="1" y="1" width="14" height="14" rx="2" stroke="currentColor" stroke-width="1.5" fill="none"/>
                            <rect class="sidebar-side-indicator" x="1" y="1" width="5" height="14" rx="2" fill="currentColor"/>
                        </svg>
                    </button>
                    <button type="button" class="sidebar-toggle" aria-label="Toggle sidebar" x-on:click="onSidebarToggle">
                        <span class="sidebar-toggle-icon" aria-hidden="true"></span>
                    </button>
                </div>
            </header>
            <nav class="sidebar-content">
                <details>
                    <summary role="button" class="secondary">Projections</summary>
                    <label for="destinationProjection">
                        Shown Projection <span x-ref="projectionInfo" id="projectionInfo" data-tooltip="" data-placement="right" role="img" aria-label="Projection properties" tabindex="0">&#9432;</span>
                        <select id="destinationProjection" x-ref="dstProjection" x-on:change="onDestinationChange"></select>
                    </label>
                    <label for="obliqueLatSlider">
                        Oblique Lat: <span x-ref="obliqueLatLabel" id="obliqueLatValue">90°</span>
                        <input type="range" id="obliqueLatSlider" x-ref="obliqueLatSlider" x-on:input="onObliqueLatInput" min="-90" max="90" step="1" value="90">
                    </label>
                    <label for="obliqueLonSlider">
                        Oblique Lon: <span x-ref="obliqueLonLabel" id="obliqueLonValue">0°</span>
                        <input type="range" id="obliqueLonSlider" x-ref="obliqueLonSlider" x-on:input="onObliqueLonInput" min="-180" max="180" step="1" value="0">
                    </label>
                    <label for="rotationSlider">
                        Rotation: <span x-ref="rotationLabel" id="rotationValue">0°</span>
                        <input type="range" id="rotationSlider" x-ref="rotationSlider" x-on:input="onRotationInput" min="-180" max="180" step="1" value="0">
                    </label>
                </details>

                <details>
                    <summary role="button" class="secondary">Source Image</summary>
                    <label>Upload Remote or Local Image</label>
                    <fieldset role="group">
                        <input type="text" x-ref="imageUrl" id="imageUrl" aria-label="Custom Image URL" placeholder="Remote Image URL" x-on:input="onImageUrlInput" x-on:keyup="onImageUrlKeyup"/>
                        <input type="button" x-ref="loadImageButton" id="loadImageButton" x-on:click="onLoadImage"/>
                    </fieldset>
                    <label for="fileInput" role="button" class="upload-btn"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>Upload Local Image</label>
                    <input type="file" x-ref="fileInput" id="fileInput" accept="image/*" x-on:change="onFileInputChange" hidden/>
                    <label for="sourceProjection">
                        Source Projection
                        <select id="sourceProjection" x-ref="srcProjection" x-on:change="onSourceChange"></select>
                    </label>
                </details>

                <details>
                    <summary role="button" class="secondary">Display Options</summary>
                    <label>
                        <input type="checkbox" role="switch" id="fullscreenToggle" x-ref="fullscreenToggle" x-on:change="onFullscreenToggle">
                        Fullscreen
                    </label>
                    <label>
                        <input type="checkbox" role="switch" id="tissotToggle" x-ref="tissotToggle" x-on:change="onTissotChange">
                        Show Tissot's Indicatrices
                    </label>
                    <label>
                        <input type="checkbox" role="switch" id="graticuleToggle" x-ref="graticuleToggle" x-on:change="onGraticuleChange">
                        Show Graticule
                    </label>
                    <label for="aspectRatioSlider">
                        Aspect Ratio: <span x-ref="aspectRatioLabel" id="aspectRatioValue">1.0x</span>
                        <input type="range" id="aspectRatioSlider" x-ref="aspectRatioSlider" x-on:input="onAspectRatioInput" min="0.01" max="2.0" step="0.01" value="1.0">
                    </label>
                    <label for="zoomSlider">
                        Zoom: <span x-ref="zoomLabel">1.0x</span>
                        <input type="range" id="zoomSlider" x-ref="zoomSlider" x-on:input="onZoomSliderInput" min="-2" max="1" step="0.01" value="0">
                    </label>
                    <label for="panXInput">
                        Pan X
                        <input type="number" id="panXInput" x-ref="panXInput" x-on:input="onPanXInput" step="0.01" value="0">
                    </label>
                    <label for="panYInput">
                        Pan Y
                        <input type="number" id="panYInput" x-ref="panYInput" x-on:input="onPanYInput" step="0.01" value="0">
                    </label>
                </details>
            </nav>
        </aside>

        <footer id="app-footer" data-theme="dark">
            <div class="app-footer-left">
                <small class="version-label">Version __VERSION__</small>
            </div>
            <div class="app-footer-center">
                <small>&copy; <a href="https://glossopoeia.com" target="_blank" rel="noopener">Glossopoeia Research, LLC</a> 2026</small>
            </div>
            <div class="app-footer-right">
                <fieldset class="tool-toggle" aria-label="Active tool">
                    <label class="tool-toggle-btn" x-bind:class="{ active: $store.app.activeTool === 'pan' }">
                        <input type="radio" name="activeTool" value="pan" x-bind:checked="$store.app.activeTool === 'pan'" x-on:change="onActiveToolChange('pan')" hidden>
                        Pan/Zoom
                    </label>
                    <label class="tool-toggle-btn" x-bind:class="{ active: $store.app.activeTool === 'rotate' }">
                        <input type="radio" name="activeTool" value="rotate" x-bind:checked="$store.app.activeTool === 'rotate'" x-on:change="onActiveToolChange('rotate')" hidden>
                        Rotate
                    </label>
                </fieldset>
            </div>
        </footer>
        
        <div class="loading-backdrop" id="loadingBackdrop" role="alert" aria-live="polite" aria-busy="true">
            <div class="loading-content">
                <img src="flatsphere-logo-animated.svg" alt="Loading..." class="loading-logo" />
                <div class="loading-text">Loading...</div>
            </div>
        </div>
        
        <dialog x-ref="notificationDialog" id="notificationDialog" role="dialog" aria-modal="true" aria-labelledby="notificationTitle" aria-describedby="notificationMessage" x-on:click="onDialogBackdropClick" x-on:cancel="onNotificationClose">
            <article>
                <header>
                    <button aria-label="Close" rel="prev" x-on:click="onNotificationClose"></button>
                    <p><strong x-ref="notificationTitle" id="notificationTitle">Notice</strong></p>
                </header>
                <p x-ref="notificationMessage" id="notificationMessage"></p>
            </article>
        </dialog>

    </main>

    <script type="module" src="scripts/main.js"></script>
</body>
</html>
