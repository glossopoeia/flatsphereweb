<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="format-detection" content="telephone=no">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://cdn.jsdelivr.net; img-src 'self' data: blob: https:; connect-src 'self' https://api.allorigins.win; worker-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self';">
    <title>WebGPU Sphere Reprojection Tool</title>
    <link rel="stylesheet" href="styles/main.css">
</head>
<body>
    <div class="app-container">
        <canvas id="projectionCanvas"></canvas>
        
        <div class="controls-overlay" id="controlsOverlay">
            <div class="controls-header">
                <h1 class="app-title">WebGPU Sphere Reprojection</h1>
                <div class="header-buttons">
                    <button class="control-button" id="toggleControls">Hide</button>
                </div>
            </div>
            
            <div class="controls-content" id="controlsContent">
                <div class="control-group full-width">
                    <label for="projectionSelect">Projection Type:</label>
                    <select id="projectionSelect">
                        <option value="0">Plate Carrée (Equirectangular)</option>
                        <option value="1">Mercator</option>
                        <option value="2">Orthographic</option>
                        <option value="3">Vertical Perspective</option>
                        <option value="4">Polar (Azimuthal Equidistant)</option>
                        <option value="5">Stereographic</option>
                    </select>
                </div>
                
                <div class="control-group full-width">
                    <label for="imageUrl">Image URL:</label>
                    <input type="text" id="imageUrl" placeholder="Enter image URL or leave empty for default">
                    <small class="help-text">
                        Try: https://upload.wikimedia.org/wikipedia/commons/thumb/8/83/Equirectangular_projection_SW.jpg/512px-Equirectangular_projection_SW.jpg
                    </small>
                </div>
                
                <div class="control-group full-width">
                    <label for="sourceProjection">Source Projection:</label>
                    <select id="sourceProjection">
                        <option value="0">Plate Carrée (Equirectangular)</option>
                        <option value="1">Mercator</option>
                        <option value="2">Orthographic</option>
                        <option value="3">Vertical Perspective</option>
                        <option value="4">Polar (Azimuthal Equidistant)</option>
                        <option value="5">Stereographic</option>
                    </select>
                </div>
                
                <div class="control-group full-width">
                    <button class="control-button full-width-button" id="loadImageButton">Load Image</button>
                </div>
                
                <div class="control-group full-width">
                    <small class="zoom-instructions">
                        💡 Use mouse wheel or pinch-to-zoom to adjust zoom level
                    </small>
                </div>
                
                <div class="control-group">
                    <label for="tissotToggle">Tissot's Indicatrices:</label>
                    <div class="checkbox-group">
                        <input type="checkbox" id="tissotToggle">
                        <span>Show</span>
                    </div>
                </div>
                
                <div class="control-group">
                    <label for="graticuleToggle">Graticule:</label>
                    <div class="checkbox-group">
                        <input type="checkbox" id="graticuleToggle">
                        <span>Show</span>
                    </div>
                </div>
            </div>
        </div>
        
        <button class="fullscreen-button" id="fullscreenButton" title="Toggle Fullscreen">⛶</button>
        
        <div class="zoom-indicator" id="zoomIndicator">2.0x</div>
        
        <div id="notificationDiv" class="notification"></div>
    </div>

    <script type="module" src="scripts/main.js"></script>
</body>
</html>
