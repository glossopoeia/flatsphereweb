<!--
  Default layout for the standalone pages: gallery, blog index/posts, merch, 404.
  Front matter expectations:
    title  — page title (used by jekyll-seo-tag for <title> + OG tags)
    nav    — slug identifying the current top-level section (gallery|blog|merch); drives nav active styling. Optional.
-->
<!DOCTYPE html>
<html lang="en">
<head>
  {% include site-head.html %}
</head>
<body>
  <header class="site-header">
    <div class="container site-header-inner">
      <a class="site-header-home" href="/" aria-label="Flatsphere home">
        <img src="/flatsphere-logo-static.svg" alt="" aria-hidden="true" class="site-header-logo">
        <span class="site-header-title">Flatsphere</span>
      </a>
      {% include site-nav.html active=page.nav %}
    </div>
  </header>

  <main class="container site-main">
    {{ content }}
  </main>

  <footer class="site-footer">
    <div class="container">
      <small>&copy; <a href="https://glossopoeia.com" target="_blank" rel="noopener">Glossopoeia Research, LLC</a> 2026</small>
    </div>
  </footer>
</body>
</html>
