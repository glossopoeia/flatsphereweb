<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>WebGPU Sphere Reprojection Tool</title>
    <script type="importmap">
        {
          "imports": {
            "wesl": "https://cdn.jsdelivr.net/npm/wesl/+esm"
          }
        }
    </script>
    <style>
        /* Reset and prevent bounce scrolling on iOS */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html, body {
            position: fixed;
            overflow: hidden;
            -webkit-overflow-scrolling: touch;
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: Arial, sans-serif;
            background-color: #1e1e1e;
            color: #fff;
        }
        
        .app-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
        }
        
        #projectionCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: #000;
            touch-action: none; /* Prevent default touch behaviors */
            display: block;
        }
        
        .controls-overlay {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            z-index: 100;
            background: rgba(45, 45, 45, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            padding: 15px;
            max-width: 350px;
            transition: opacity 0.3s ease;
        }
        
        .controls-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        
        .app-title {
            font-size: 1.1em;
            font-weight: bold;
            margin: 0;
        }
        
        .header-buttons {
            display: flex;
            gap: 8px;
        }
        
        .control-button {
            background: rgba(64, 64, 64, 0.8);
            border: 1px solid #555;
            border-radius: 6px;
            color: #fff;
            padding: 6px 10px;
            font-size: 0.9em;
            cursor: pointer;
            transition: background 0.2s ease;
        }
        
        .control-button:hover {
            background: rgba(80, 80, 80, 0.8);
        }
        
        .control-button.active {
            background: rgba(100, 150, 255, 0.8);
        }
        
        .controls-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        
        .control-group {
            margin: 0;
        }
        
        .control-group.full-width {
            grid-column: 1 / -1;
        }
        
        label {
            display: block;
            margin-bottom: 6px;
            font-weight: bold;
            font-size: 0.9em;
        }
        
        select, input[type="range"] {
            width: 100%;
            padding: 8px;
            background-color: rgba(64, 64, 64, 0.8);
            border: 1px solid #555;
            border-radius: 6px;
            color: #fff;
            font-size: 0.9em;
        }
        
        input[type="checkbox"] {
            width: 18px;
            height: 18px;
            margin: 0;
            accent-color: #64a6ff;
        }
        
        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .range-display {
            display: flex;
            justify-content: space-between;
            margin-top: 4px;
            font-size: 0.8em;
            color: #ccc;
        }
        
        .error {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 200;
            color: #ff6b6b;
            padding: 15px 20px;
            background-color: rgba(74, 21, 21, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 8px;
            display: none;
            max-width: 90%;
            white-space: pre-line;
            line-height: 1.4;
            font-size: 0.9em;
            text-align: center;
            border: 1px solid rgba(255, 107, 107, 0.3);
        }
        
        .controls-collapsed {
            opacity: 0.3;
        }
        
        .fullscreen-button {
            position: absolute;
            bottom: 20px;
            right: 20px;
            z-index: 100;
            background: rgba(45, 45, 45, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid #555;
            border-radius: 50%;
            color: #fff;
            width: 50px;
            height: 50px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2em;
            transition: background 0.2s ease;
        }
        
        .fullscreen-button:hover {
            background: rgba(60, 60, 60, 0.9);
        }
        
        /* Mobile optimizations */
        @media (max-width: 768px) {
            .controls-overlay {
                top: 10px;
                left: 10px;
                right: 10px;
                padding: 12px;
                max-width: none;
            }
            
            .app-title {
                font-size: 1em;
            }
            
            .controls-content {
                grid-template-columns: 1fr;
                gap: 12px;
            }
            
            .control-button {
                padding: 8px 12px;
                font-size: 0.9em;
            }
            
            select, input[type="range"] {
                padding: 10px;
                font-size: 1em;
            }
            
            input[type="checkbox"] {
                width: 20px;
                height: 20px;
            }
            
            .fullscreen-button {
                width: 56px;
                height: 56px;
                font-size: 1.3em;
            }
        }
        
        /* Landscape phone optimization */
        @media (max-width: 768px) and (orientation: landscape) {
            .controls-overlay {
                top: 8px;
                padding: 10px;
            }
            
            .controls-content {
                grid-template-columns: 1fr 1fr;
                gap: 10px;
            }
            
            .fullscreen-button {
                bottom: 15px;
                right: 15px;
                width: 48px;
                height: 48px;
            }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <canvas id="projectionCanvas"></canvas>
        
        <div class="controls-overlay" id="controlsOverlay">
            <div class="controls-header">
                <h1 class="app-title">WebGPU Sphere Reprojection</h1>
                <div class="header-buttons">
                    <button class="control-button" id="toggleControls">Hide</button>
                </div>
            </div>
            
            <div class="controls-content" id="controlsContent">
                <div class="control-group full-width">
                    <label for="projectionSelect">Projection Type:</label>
                    <select id="projectionSelect">
                        <option value="0">Stereographic</option>
                        <option value="1">Polar (Azimuthal Equidistant)</option>
                        <option value="2">Orthographic</option>
                        <option value="3">Vertical Perspective</option>
                        <option value="4">Mercator</option>
                        <option value="5">Plate Carrée (Equirectangular)</option>
                    </select>
                </div>
                
                <div class="control-group full-width">
                    <label for="zoomSlider">Zoom Level:</label>
                    <input type="range" id="zoomSlider" min="0.01" max="10" value="2" step="0.01">
                    <div class="range-display">
                        <span>0.01</span>
                        <span id="zoomValue">2.0</span>
                        <span>10.0</span>
                    </div>
                </div>
                
                <div class="control-group">
                    <label for="tissotToggle">Tissot's Indicatrices:</label>
                    <div class="checkbox-group">
                        <input type="checkbox" id="tissotToggle">
                        <span>Show</span>
                    </div>
                </div>
                
                <div class="control-group">
                    <label for="graticuleToggle">Graticule:</label>
                    <div class="checkbox-group">
                        <input type="checkbox" id="graticuleToggle">
                        <span>Show</span>
                    </div>
                </div>
            </div>
        </div>
        
        <button class="fullscreen-button" id="fullscreenButton" title="Toggle Fullscreen">⛶</button>
        
        <div id="errorDiv" class="error"></div>
    </div>

    <script type="module" src="main.js"></script>
</body>
</html>
