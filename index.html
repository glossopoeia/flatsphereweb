<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="format-detection" content="telephone=no">
    <meta name="description" content="Interactive web tool for comparing different cartographic projections using WebGPU. Visualize how map projections transform the sphere with real-time rendering.">
    <meta name="keywords" content="cartography, map projections, WebGPU, geography, Mercator, orthographic, perspective, tissot, graticule">
    <meta name="color-scheme" content="light dark">
    <meta property="og:title" content="Flatsphere: Interactive Reprojections of the Sphere">
    <meta property="og:description" content="Interactive web tool for comparing different cartographic projections">
    <meta property="og:type" content="website">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' https://cdn.jsdelivr.net; script-src 'self' https://cdn.jsdelivr.net; img-src 'self' data: blob: https:; connect-src 'self' https://api.allorigins.win; worker-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self';">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.orange.min.css">
    <link rel="stylesheet" href="styles/main.css">
    <link rel="icon" type="image/svg+xml" sizes="any" href="./flatsphere-logo-static.svg">

    <title>Flatsphere: Interactive Reprojections of the Sphere</title>
</head>
<body>
    <main class="app-container">
        <canvas id="projectionCanvas" aria-label="Interactive map projection visualization" role="img"></canvas>
        
        <div class="bottom-controls" id="bottomControls">
            <div class="bottom-control-group">
                <button class="bottom-control-button projection-button" id="projectionButton" type="button" title="Select Shown Projection" aria-label="Select shown map projection">
                    <div class="projection-preview" id="projectionPreview" aria-hidden="true">🗺️</div>
                </button>
                <div class="bottom-control-label" id="projectionLabel">Shown</div>
            </div>
            <div class="bottom-control-group">
                <button class="bottom-control-button source-button" id="sourceButton" type="button" title="Select Source Projection" aria-label="Select source map projection">
                    <div class="source-preview" id="sourcePreview" aria-hidden="true">🗺️</div>
                </button>
                <div class="bottom-control-label" id="sourceLabel">Source</div>
            </div>
            <div class="bottom-control-group">
                <button class="bottom-control-button image-source-button" id="imageSourceButton" type="button" title="Custom Image Source" aria-label="Custom image source">
                    <div class="image-source-icon" aria-hidden="true">🖼️</div>
                </button>
                <div class="bottom-control-label" id="imageSourceLabel">Image</div>
            </div>
            <div class="bottom-control-group">
                <button class="bottom-control-button options-button" id="optionsButton" type="button" title="Display Options" aria-label="Display options">
                    <div class="options-icon" aria-hidden="true">⚙️</div>
                </button>
                <div class="bottom-control-label" id="optionsLabel">Options</div>
            </div>
        </div>

        <article class="unified-projection-panel" id="projectionPanel" data-panel-type="destination" role="dialog" aria-labelledby="projectionPanelTitle" aria-modal="true">
            <header>
                <p id="projectionPanelTitle">Select Shown Projection</p>
                <button id="projectionPanelClose" aria-label="Close projection panel" rel="prev"></button>
            </header>
            <div class="projection-grid overflow-auto" id="projectionGrid">
                <!-- Projection options will be populated by JavaScript -->
            </div>
        </article>

        <article class="unified-projection-panel" id="sourcePanel" data-panel-type="source" role="dialog" aria-labelledby="sourcePanelTitle" aria-modal="true">
            <header>
                <p id="sourcePanelTitle">Select Source Projection</p>
                <button id="sourcePanelClose" aria-label="Close source projection panel" rel="prev"></button>
            </header>
            <div class="projection-grid overflow-auto" id="sourceGrid">
                <!-- Source projection options will be populated by JavaScript -->
            </div>
        </article>

        <article class="options-panel" id="optionsPanel" role="dialog" aria-labelledby="optionsPanelTitle" aria-modal="true">
            <header>
                <p id="optionsPanelTitle">Display Options</p>
                <button id="optionsPanelClose" aria-label="Close options panel" rel="prev"></button>
            </header>
            <fieldset>
                <input type="checkbox" role="switch" id="tissotToggle">
                <label for="tissotToggle">Show Tissot's Indicatrices</label>
                <input type="checkbox" role="switch" id="graticuleToggle">
                <label for="graticuleToggle" class="checkbox-label">Show Graticule</label>
            </fieldset>

            <fieldset role="group">
                <label for="aspectRatioSlider">Aspect Ratio:</label>
                <input type="range" id="aspectRatioSlider" min="0.01" max="2.0" step="0.01" value="1.0">
                <span id="aspectRatioValue">1.0x</span>
            </fieldset>
        </article>

        <article class="image-source-panel" id="imageSourcePanel" role="dialog" aria-labelledby="imageSourcePanelTitle" aria-modal="true">
            <header>
                <p id="imageSourcePanelTitle">Custom Image Source</p>
                <button id="imageSourcePanelClose" aria-label="Close image source panel" rel="prev"></button>
            </header>
            <fieldset role="group">
                <input type="text" id="imageUrl" aria-label="Custom Image URL" aria-describedby="image-url-help" placeholder="Enter image URL"/>
                <input type="button" id="loadImageButton" value="Load Remote"/>
            </fieldset>
            <small id="image-url-help">Use an image from somewhere else on the internet</small>
            
            <input type="file" id="fileInput" accept="image/*"/>
            <small id="file-input-help">Or select an image file saved on your device</small>
        </article>

        <div class="panel-backdrop" id="panelBackdrop"></div>
        
        <div class="loading-backdrop" id="loadingBackdrop" role="alert" aria-live="polite" aria-busy="true">
            <div class="loading-content">
                <img src="flatsphere-logo-animated.svg" alt="Loading..." class="loading-logo" />
                <div class="loading-text">Loading...</div>
            </div>
        </div>
        
        <button class="fullscreen-button" id="fullscreenButton" type="button" title="Toggle Fullscreen" aria-label="Toggle fullscreen mode">⛶</button>
        
        <div class="zoom-indicator" id="zoomIndicator" aria-live="polite" aria-label="Current zoom level">2.0x</div>
        
        <div id="notificationDiv" class="notification" aria-live="polite" aria-atomic="true" role="status"></div>

        <noscript>
            <p>This application requires JavaScript and WebGPU support to function.</p>
        </noscript>
    </main>

    <script type="module" src="scripts/main.js"></script>
</body>
</html>
