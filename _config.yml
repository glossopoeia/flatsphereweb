title: Flatsphere
description: Interactive reprojections of the sphere.
url: https://flatsphere.dev
baseurl: ""
permalink: /blog/:slug/

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

# Disable kramdown's built-in math engine. MathJax 3 (loaded only on posts
# that opt in via `math: true` front matter) scans for $...$ and $$...$$
# delimiters directly, which kramdown would otherwise wrap in
# <script type="math/tex"> tags that MathJax 3 doesn't process by default.
kramdown:
  math_engine: null

collections:
  projections:
    output: true
    permalink: /gallery/:path/

defaults:
  - scope:
      path: ""
      type: projections
    values:
      layout: projection
      nav: gallery
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      nav: blog
      author: rob

exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - Makefile
  - vendor/
  - "*.pem"
  - server.log
  - .claude/
